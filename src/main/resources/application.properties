spring.application.name=ma3-network
server.port=${PORT:8080}

# Database Connection (Reads from .env)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration (Auto-creates tables in Aiven)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Security (Reads from .env)
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION}

app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.phone=${ADMIN_PHONE}

# Spring Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# M-Pesa Daraja API (Reads from .env)
daraja.consumer-key=${DARAJA_CONSUMER_KEY}
daraja.consumer-secret=${DARAJA_CONSUMER_SECRET}
daraja.business-shortcode=174379
daraja.passkey=bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919
daraja.callback-url=${MPESA_CALLBACK_URL}
daraja.api-url=https://sandbox.safaricom.co.ke/mpesa/stkpush/v1/processrequest
daraja.auth-url=https://sandbox.safaricom.co.ke/oauth/v1/generate?grant_type=client_credentials

# Document upload directory (relative to project root)
app.upload.dir=uploads/documents

# Allow multipart uploads up to 10 MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB